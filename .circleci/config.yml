version: 2.1

executors:
  java-executor:
    docker:
      - image: cimg/openjdk:8.0.322
    resource_class: xlarge
    environment:
      GRADLE_OPTS: "-Djenkins=true -Xmx8192m"
      TERM: dumb
      CONTAINER_BUILD: "true"

commands:
  init:
    steps:
      - checkout:
          path: ~/$CIRCLE_PROJECT_REPONAME

  save_project:
    steps:
      - run:
          name: Save project to workspace
          command: cp -r ~/$CIRCLE_PROJECT_REPONAME ~/project

  restore_project:
    steps:
      - run:
          name: Restore project from workspace
          command: |
            mkdir -p ~/$CIRCLE_PROJECT_REPONAME
            cp -r ~/project/* ~/$CIRCLE_PROJECT_REPONAME/

jobs:
  setup:
    executor: java-executor
    steps:
      - init
      - run:
          name: Generate gradle.lock
          command: |
            cd ~/$CIRCLE_PROJECT_REPONAME
            cat build.gradle > ~/gradle.lock
      - persist_to_workspace:
          root: ~/
          paths:
            - gradle.lock

  compile:
    executor: java-executor
    steps:
      - init
      - attach_workspace:
          at: ~/
      - restore_cache:
          key: v1-jars-{{ .Environment.CIRCLE_PROJECT_REPONAME }}-{{ .Branch }}-{{ checksum "~/gradle.lock" }}
      - run:
          name: Compile Project
          command: |
            cd ~/$CIRCLE_PROJECT_REPONAME
            ./gradlew compileJava compileTestJava --refresh-dependencies --no-daemon
      - save_cache:
          paths:
            - ~/.gradle
          key: v1-jars-{{ .Environment.CIRCLE_PROJECT_REPONAME }}-{{ .Branch }}-{{ checksum "~/gradle.lock" }}
      - save_project
      - persist_to_workspace:
          root: ~/
          paths:
            - project

  test:
    executor: java-executor
    parallelism: 4
    steps:
      - attach_workspace:
          at: ~/
      - restore_cache:
          key: v1-jars-{{ .Environment.CIRCLE_PROJECT_REPONAME }}-{{ .Branch }}-{{ checksum "~/gradle.lock" }}
      - restore_project
      - run:
          name: Run Tests
          command: |
            cd ~/$CIRCLE_PROJECT_REPONAME
            mkdir -p ~/junit/
            # Use circleci tests run for rerun-failed-tests support
            circleci tests glob "src/test/java/**/*.java" \
              | sed 's|src/test/java/||' \
              | sed 's|/|.|g' \
              | sed 's|\.java$||' \
              | circleci tests run --command="xargs bash -c './gradlew test --no-daemon \$(printf \" --tests %s\" \"\$@\")' _" --verbose --split-by=timings
      - run:
          name: Save test results
          command: |
            cd ~/$CIRCLE_PROJECT_REPONAME
            mkdir -p ~/junit/
            find . -type f -regex ".*/build/test-results/.*xml" -exec cp {} ~/junit/ \;
          when: always
      - store_test_results:
          path: ~/junit
      - store_artifacts:
          path: ~/junit

  publish:
    executor: java-executor
    steps:
      - attach_workspace:
          at: ~/
      - restore_cache:
          key: v1-jars-{{ .Environment.CIRCLE_PROJECT_REPONAME }}-{{ .Branch }}-{{ checksum "~/gradle.lock" }}
      - restore_project
      - run:
          name: Package and Publish
          command: |
            cd ~/$CIRCLE_PROJECT_REPONAME
            ./gradlew assemble publish --no-daemon
      - run:
          name: Save artifacts
          command: |
            cd ~/$CIRCLE_PROJECT_REPONAME
            mkdir -p ~/artifacts/
            find . -type f -regex ".*/build/libs/.*jar" -exec cp {} ~/artifacts/ \;
      - store_artifacts:
          path: ~/artifacts

workflows:
  version: 2
  build_and_publish:
    jobs:
      - setup
      - compile:
          requires:
            - setup
      - test:
          requires:
            - compile
      - publish:
          requires:
            - test
